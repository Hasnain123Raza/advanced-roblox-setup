name: CI

on:
    pull_request:
        branches:
            - main
    push:
        branches-ignore:
            - main

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x"
                  cache: "npm"

            - run: npm install

            - name: Build Check
              run: npm run build
